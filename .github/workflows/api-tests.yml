name: API Tests - Docker + Allure

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t api-tests .

      - name: Remover container antigo se existir
        run: docker rm -f api-tests-container || true

      - name: Rodar testes no container
        run: docker run --name api-tests-container api-tests

      - name: Copiar relatório Allure do container
        if: always()
        run: docker cp api-tests-container:/app/target ./target

      - name: Remover container
        if: always()
        run: docker rm api-tests-container || true

      - name: Salvar relatório Allure como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin